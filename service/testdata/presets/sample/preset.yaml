folio_version: "0.1"
id: sample
version: 1.0.0
description: Service-layer test preset
author: hollis-labs

inputs:
  - name: project_name
    type: string
    required: true
    pattern: "^[a-z][a-z0-9_]*$"
    description: Go module name
  - name: github_owner
    type: string
    required: true
  - name: description
    type: string
    default: ""

computed:
  module_path: "github.com/{{ .inputs.github_owner }}/{{ .inputs.project_name }}"

files:
  source: ./files
  template_suffix: .tmpl
  ignore:
    - "*.example"
