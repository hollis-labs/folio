folio_version: "0.1"
id: base
version: 0.1.0
description: Minimal Go project layout — folio's atom preset
author: hollis-labs
license: MIT

inputs:
  - name: project_name
    type: string
    required: true
    pattern: "^[a-z][a-z0-9_]*$"
    description: Go module name (lowercase, snake_case)
  - name: github_owner
    type: string
    required: true
    description: GitHub username or org
  - name: description
    type: string
    default: ""
    description: One-line project description

computed:
  module_path: "github.com/{{ .inputs.github_owner }}/{{ .inputs.project_name }}"
  year: "{{ .now.Year }}"

files:
  source: ./files
  template_suffix: .tmpl

sync:
  default: prompt
  rules:
    - glob: "Makefile"
      policy: overwrite
    - glob: ".github/workflows/**"
      policy: overwrite
    - glob: "internal/**"
      policy: skip
    - glob: "README.md"
      policy: three-way
